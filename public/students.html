<!DOCTYPE html>
<html>

<head>

<title>Registered Students</title>

<link rel="stylesheet" href="styles.css">

</head>


<body>


<div class="container">


<h1>Registered Students</h1>


<nav>

<a href="/">Register</a>

</nav>



<table>


<thead>

<tr>

<th>ID</th>
<th>First Name</th>
<th>Last Name</th>
<th>Project Title</th>
<th>Email</th>
<th>Phone</th>
<th>Time Slot</th>

</tr>

</thead>


<tbody id="studentTable">


</tbody>


</table>


</div>



<script>


fetch("/api/students")

.then(response => response.json())

.then(data => {

    const table =
    document.getElementById("studentTable");


    data.forEach(student => {


        let row = document.createElement("tr");


        row.innerHTML = `

        <td>${student.student_id}</td>

        <td>${student.first_name}</td>

        <td>${student.last_name}</td>

        <td>${student.project_title}</td>

        <td>${student.email}</td>

        <td>${student.phone}</td>

        <td>${student.slot_time}</td>

        `;


        table.appendChild(row);


    });


})

.catch(error => {

    console.log(error);

});


</script>


</body>

</html>
